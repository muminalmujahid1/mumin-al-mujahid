<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mumin Al Mujahid | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:Poppins;
  background:#f4f6fb;
  color:#222;
  transition:.3s;
}
body.dark{background:#111;color:#eee}

header{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
}
.profile{
  width:140px;height:140px;border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  margin-bottom:15px;
}

section{
  max-width:1000px;
  margin:50px auto;
  background:#fff;
  padding:40px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
body.dark section{background:#1e1e1e}

h2{text-align:center;margin-bottom:20px;color:#2563eb}

/* SETTINGS */
.top{
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
  z-index:999;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:10px 15px;
  border-radius:25px;
  cursor:pointer;
  border:none;
}

.settings{
  position:relative;
}

.menu{
  position:absolute;
  top:45px;
  right:0;
  background:#fff;
  width:180px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  display:none;
  flex-direction:column;
  overflow:hidden;
}
body.dark .menu{background:#222}

.menu div{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}
.menu div:hover{background:#f0f0f0}
body.dark .menu div:hover{background:#333}

/* SKILLS */
.skills{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.skill{
  text-align:center;
  padding:25px;
  border-radius:15px;
  border:1px solid #ddd;
}

/* PORTFOLIO */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}
.card{
  border-radius:12px;
  overflow:hidden;
  border:1px solid #ddd;
}
.card img{width:100%;height:180px;object-fit:cover}
.card p{text-align:center;padding:10px;font-weight:600}

/* FLOAT */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.float a{
  width:55px;height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}
.whatsapp{background:#25D366}
.facebook{background:#1877F2}
.youtube{background:#FF0000}
</style>
</head>

<body>

<!-- TOP SETTINGS -->
<div class="top">

<div class="settings">
<button class="btn" onclick="toggleMenu()">
<i class="fa-solid fa-gear"></i>
</button>

<div class="menu" id="menu">

<div onclick="toggleDark()">🌙 <span data-key="dark">Dark Mode</span></div>

<div onclick="setLang('en')">🇬🇧 English</div>
<div onclick="setLang('bn')">🇧🇩 বাংলা</div>

</div>
</div>

</div>

<!-- HEADER -->
<header>
<img src="https://i.postimg.cc/1RYfjVf4/Professional-podcast-setup-with-You-Tube-branding.png" class="profile">
<h1 id="name">Mumin Al Mujahid</h1>
<p id="tagline"></p>
</header>

<!-- ABOUT -->
<section>
<h2 data-key="about">About Me</h2>
<p id="aboutText" style="text-align:center">
I am a creative digital professional from Bangladesh.
</p>
</section>

<!-- SKILLS -->
<section>
<h2 data-key="skills">My Skills</h2>
<div class="skills">
<div class="skill">Graphic Design</div>
<div class="skill">Video Editing</div>
<div class="skill">Web Development</div>
</div>
</section>

<!-- PORTFOLIO -->
<section>
<h2 data-key="work">My Work</h2>
<div class="grid">
<div class="card">
<img src="https://i.postimg.cc/rsLcBcXN/Untitled-design-10.png">
<p>YouTube Thumbnail</p>
</div>
<div class="card">
<img src="https://i.postimg.cc/mg734yH7/Untitled-design-3.png">
<p>Logo Design</p>
</div>
</div>
</section>

<!-- CONTACT -->
<section>
<h2 data-key="contact">Contact</h2>
<p style="text-align:center">muminalmujahid21@gmail.com</p>
<p style="text-align:center">01841853638</p>
</section>

<!-- FLOAT BUTTONS -->
<div class="float">
<a href="#" class="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
<a href="#" class="facebook"><i class="fa-brands fa-facebook"></i></a>
<a href="#" class="youtube"><i class="fa-brands fa-youtube"></i></a>
</div>

<script>

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark", document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark");
}

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}
document.addEventListener("click",(e)=>{
if(!e.target.closest(".settings")) {
document.getElementById("menu").classList.remove("show");
}
});

/* TYPE EFFECT */
const text="Creative Designer | Developer | Editor";
let i=0;
function type(){
if(i<text.length){
document.getElementById("tagline").innerHTML+=text[i];
i++;
setTimeout(type,70);
}
}
type();

/* LANGUAGE SYSTEM */
const lang={
en:{
about:"About Me",
skills:"My Skills",
work:"My Work",
contact:"Contact",
dark:"Dark Mode"
},
bn:{
about:"আমার সম্পর্কে",
skills:"আমার দক্ষতা",
work:"আমার কাজ",
contact:"যোগাযোগ",
dark:"ডার্ক মোড"
}
};

let current="en";

function setLang(l){
current=l;
document.querySelectorAll("[data-key]").forEach(el=>{
el.innerText=lang[l][el.dataset.key];
});
localStorage.setItem("lang",l);
}

if(localStorage.getItem("lang")){
setLang(localStorage.getItem("lang"));
}

</script>

</body>
</html>
