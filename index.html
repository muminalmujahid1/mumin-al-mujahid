<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mumin Al Mujahid | Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
html{scroll-behavior:smooth}
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Poppins;
  background:#f3f5f9;
  color:#333;
  transition:.3s;
  overflow-x:hidden;
}

body.dark-mode{
  background:#121212;
  color:#eee;
}

header{
  background:linear-gradient(135deg,#0f172a,#2563eb,#3b82f6);
  color:#fff;
  text-align:center;
  padding:80px 20px;
}

body.dark-mode header{
  background:linear-gradient(135deg,#000,#1e293b);
}

.profile-img{
  width:150px;
  height:150px;
  border-radius:50%;
  border:5px solid rgba(255,255,255,.2);
  object-fit:cover;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}
  70%{box-shadow:0 0 0 20px rgba(255,255,255,0)}
  100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}
}

section{
  max-width:1000px;
  margin:45px auto;
  background:#fff;
  padding:40px;
  border-radius:24px;
  box-shadow:0 10px 40px rgba(0,0,0,.05);
}

body.dark-mode section{
  background:#1e1e1e;
}

h2{text-align:center;color:#2563eb;margin-bottom:25px}

/* TOP CONTROLS */
.top-controls{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
  z-index:9999;
}

.top-btn{
  background:#2563eb;
  color:#fff;
  padding:10px 18px;
  border-radius:25px;
  border:none;
  cursor:pointer;
}

/* SETTINGS */
.settings-wrapper{position:relative}

.settings-dropdown{
  position:absolute;
  top:45px;
  right:0;
  background:#fff;
  min-width:180px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  display:none;
  overflow:hidden;
}

body.dark-mode .settings-dropdown{
  background:#1e1e1e;
}

.settings-dropdown.active{
  display:block;
}

.dropdown-item{
  padding:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.dropdown-item:hover{
  background:#f0f0f0;
}

body.dark-mode .dropdown-item:hover{
  background:#333;
}

/* SKILLS */
.skills{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.skill{
  text-align:center;
  padding:25px;
  border-radius:15px;
  border:1px solid #ddd;
  transition:.3s;
}

.skill:hover{
  transform:translateY(-10px);
}

/* FLOAT BUTTONS */
.float-buttons{
  position:fixed;
  bottom:25px;
  right:25px;
  display:flex;
  flex-direction:column-reverse;
  gap:15px;
}

.float-buttons a{
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:24px;
  text-decoration:none;
}

.whatsapp{background:#25D366}
.facebook{background:#1877F2}
.youtube{background:#FF0000}
.instagram{background:radial-gradient(circle,#fdf497,#fd5949,#d6249f,#285AEB)}
.tiktok{background:#000}
</style>
</head>

<body>

<!-- TOP -->
<div class="top-controls">

<div class="settings-wrapper">

<button class="top-btn" onclick="toggleSettings()">
<i class="fa fa-gear"></i>
</button>

<div class="settings-dropdown" id="settingsMenu">

<div class="dropdown-item" onclick="toggleDarkMode()">
Dark Mode <i class="fa fa-moon"></i>
</div>

<div class="dropdown-item" onclick="setLang('en')">English</div>
<div class="dropdown-item" onclick="setLang('bn')">বাংলা</div>

</div>

</div>

</div>

<!-- HEADER -->
<header>
<img src="https://i.postimg.cc/1RYfjVf4/Professional-podcast-setup-with-You-Tube-branding.png" class="profile-img">
<h1 id="name">Mumin Al Mujahid</h1>
<p id="typing-text"></p>
</header>

<!-- ABOUT -->
<section>
<h2 data-key="about">About Me</h2>
<p id="aboutText" style="text-align:center">
Creative Digital Professional from Bangladesh.
</p>
</section>

<!-- SKILLS -->
<section>
<h2 data-key="skills">My Skills</h2>
<div class="skills">
<div class="skill">Graphic Design</div>
<div class="skill">Video Editing</div>
<div class="skill">Web Development</div>
</div>
</section>

<!-- FLOAT -->
<div class="float-buttons">
<a href="javascript:void(0)" onclick="toggleFloat()"><i class="fa fa-plus"></i></a>
<a href="https://wa.me/8801841853638" class="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
<a href="https://facebook.com" class="facebook"><i class="fa-brands fa-facebook"></i></a>
<a href="https://youtube.com" class="youtube"><i class="fa-brands fa-youtube"></i></a>
<a href="https://instagram.com" class="instagram"><i class="fa-brands fa-instagram"></i></a>
<a href="https://tiktok.com" class="tiktok"><i class="fa-brands fa-tiktok"></i></a>
</div>

<script>

/* SETTINGS */
function toggleSettings(){
document.getElementById("settingsMenu").classList.toggle("active");
}

/* DARK MODE */
function toggleDarkMode(){
document.body.classList.toggle("dark-mode");
localStorage.setItem("dark", document.body.classList.contains("dark-mode"));
}

if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark-mode");
}

/* CLICK OUTSIDE CLOSE */
window.addEventListener("click",function(e){
if(!e.target.closest(".settings-wrapper")){
document.getElementById("settingsMenu").classList.remove("active");
}
});

/* TYPE */
const text="Graphic Designer | Developer | Video Editor";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing-text").innerHTML+=text[i];
i++;
setTimeout(type,80);
}
}
type();

/* LANGUAGE (SAFE UPGRADE ONLY) */
const lang={
en:{
about:"About Me",
skills:"My Skills"
},
bn:{
about:"আমার সম্পর্কে",
skills:"আমার দক্ষতা"
}
};

function setLang(l){
document.querySelectorAll("[data-key]").forEach(el=>{
el.innerText=lang[l][el.dataset.key];
});
localStorage.setItem("lang",l);
}

if(localStorage.getItem("lang")){
setLang(localStorage.getItem("lang"));
}

</script>

</body>
</html>
